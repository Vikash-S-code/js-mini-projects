<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Advanced Notes App</title>
    <link rel="stylesheet" href="NotesApp.css" />
  </head>
  <body id="NotesPage">
    <center class="Wel"><h1 class="WelH">Welcom To The Notes App</h1></center>
    <div class="container_fun">
      <div class="funbar">
        <span class="fun_btn">Create New Note</span>
        <span class="fun_btn" >Load Notes</span>
        <span class="fun_btn"">Edit Notes</span>
        <span class="fun_btn"">Clear All Notes</span>
      </div>
    </div>

    <div class="save_pop_up">
        <h3 class="Popup_tittle" id="popUptittle">Data</h3>
        <p class="Saving_Successed">Note Saved Successfully</p>
        <!-- <span class="pop_ok">OK</span> -->
      </div>

    <div class="Alert_on_clear_notes">
      <h2 class="alert_notice">Are you sure to deleting all notes </h2>
      <span class="yes agree_on_delete">Yes</span>
      <span class="no agree_on_delete">No</span>
    </div>
  
    <div class="edit_search_box">
      <div class="edit_search">
        <input type="text" name="search_text" placeholder="Search by Tittle" class="search_input">
        <span class="search">Search</span>
      </div>
    </div>


<script src="Notes.js"></script>
  </body>
</html>
